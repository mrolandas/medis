<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Family Tree</title>
    <link rel="stylesheet" href="sample.css" />
  </head>
  <body>
    <div id="content">
      <!-- Spouse Group -->
      <div id="husband" class="mydiv">Husband</div>
      <div id="wife" class="mydiv">Wife</div>
      <div id="spouse-line" class="line"></div>

      <!-- Child Group -->
      <div id="child1" class="mydiv">Child 1</div>
      <div id="child2" class="mydiv">Child 2</div>
      <div id="child-line1" class="line"></div>
      <div id="child-line2" class="line"></div>
    </div>
    <script src="sample.js"></script>
  </body>
</html>
